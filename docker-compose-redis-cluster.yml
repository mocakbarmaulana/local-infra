version: "3.9"

services:
  redis-node-1:
    image: redis:7
    container_name: redis-node-1
    network_mode: host
    command: >
      redis-server
      --port 7001
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --dir /data
    volumes:
      - redis-node-1-data:/data

  redis-node-2:
    image: redis:7
    container_name: redis-node-2
    network_mode: host
    command: >
      redis-server
      --port 7002
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --dir /data
    volumes:
      - redis-node-2-data:/data

  redis-node-3:
    image: redis:7
    container_name: redis-node-3
    network_mode: host
    command: >
      redis-server
      --port 7003
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --dir /data
    volumes:
      - redis-node-3-data:/data

  redis-cluster-init:
    image: redis:7
    container_name: redis-cluster-init
    network_mode: host
    depends_on:
      - redis-node-1
      - redis-node-2
      - redis-node-3
    command: >
      bash -c "
      sleep 5 &&
      redis-cli --cluster create
      127.0.0.1:7001
      127.0.0.1:7002
      127.0.0.1:7003
      --cluster-replicas 0
      --cluster-yes
      "

volumes:
  redis-node-1-data:
  redis-node-2-data:
  redis-node-3-data:
