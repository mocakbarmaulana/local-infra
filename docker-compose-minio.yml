services:
  minio:
    image: minio/minio
    container_name: innovesia_minio
    ports:
      - "9010:9000"   # MinIO API
      - "9011:9001"   # MinIO Console UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  minio_data:
